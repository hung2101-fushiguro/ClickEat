name: Exercise 6 CI

on:
  workflow_dispatch:
  push:
    paths:
      - "Automation Testing/Exercise 6/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Automation Testing/Exercise 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: mvn -B test -Dheadless=true
