# Local runtime config (do NOT commit real secrets)
# You can also set these via environment variables or -D JVM args.

TWILIO_ACCOUNT_SID=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
TWILIO_AUTH_TOKEN=your_twilio_auth_token_here
TWILIO_VERIFY_SERVICE_SID=VAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# OTP_MODE=MOCK lets guest checkout use a local OTP code without calling Twilio.
# Set OTP_MODE=TWILIO (or remove OTP_MODE) to use real Twilio Verify.
OTP_MODE=MOCK
OTP_MOCK_CODE=123456
